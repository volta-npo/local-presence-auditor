openapi: 3.1.0
info:
  title: "Local Presence Auditor API"
  version: "1.0.0"
  description: "Backend API for A zero-login audit that shows a local business exactly where its online footprint is missing, broken, or invisible."
servers:
  - url: http://127.0.0.1:8788
    description: Rust backend
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Product identity and health status
  /score:
    get:
      summary: Score deterministic sample gates
      responses:
        '200':
          description: Release score and fingerprint
 